            - heading "Systems of Meaning" [level=3] [ref=e315]
            - paragraph [ref=e316]: "A short operating statement for the archive: memory, performance, and cultural translation as systems rather than isolated works."
          - generic [ref=e317]:
            - paragraph [ref=e318]: "I build systems for memory, performance, and cultural translation. The work moves across sound, space, code, text, image, and systems because the subject keeps changing scale: a song becomes a public architecture, a building becomes a social protocol, a manuscript becomes a software engine, and a data set becomes a record of cultural pressure."
            - paragraph [ref=e319]: Systems Choreography names the method behind that movement. It treats space, time, code, narrative, and performance as related structures that can be rehearsed, tuned, and reassembled. The archive is not a neutral container for finished objects. It is a way of showing how the objects think together.
            - paragraph [ref=e320]: "The point is not to make technology look magical. It is to make cultural structure visible: who gets translated, what gets flattened, where memory is stored, and how people build forms of belonging under pressure."
