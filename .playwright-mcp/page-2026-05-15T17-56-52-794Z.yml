          - paragraph [ref=e196]: A forensic argument about what generative music systems erase when they treat Arabic music as style instead of structure.
        - generic [ref=e197]:
          - paragraph [ref=e203]: "The Localization Gap begins from a simple failure: generative music systems can often imitate the surface of Arabic music while missing the systems that make the music culturally legible. Maqam, dialect, ornamentation, tuning behavior, phrasing, and regional memory are compressed into generic global signals."
          - paragraph [ref=e204]: That failure is not only aesthetic. It is infrastructural. A model that cannot hear cultural specificity cannot preserve it, translate it, or build with it responsibly. The audit treats failed outputs as evidence rather than accidents.
          - paragraph [ref=e205]: The work compares prompts, outputs, phonetic artifacts, tuning assumptions, and genre defaults to show how computational systems can reproduce colonial listening habits through technical convenience.
